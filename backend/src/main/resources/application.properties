spring.application.name=secondhand-market
spring.config.import=optional:file:.env[.properties]

# ===============================
# Active Profile
# ===============================
spring.profiles.active=local

# ===============================
# common JPA configuration
# ===============================
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# ===============================
# Common Server Configuration
# ===============================
server.port=8080

# ===============================
# Redis (Refresh Token / Access Token 블랙리스트)
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===============================
# JWT
# ===============================
spring.jwt.secret=${JWT_SECRET}

# --- 파일 업로드 (multipart) ---
# 앱 레벨에서 파일당 5MB를 검증하므로 서블릿 한도는 여유 있게 둔다(초과 시 일관된 ApiResponse로 응답).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# --- Supabase Storage (이미지 저장소) ---
# 값은 .env로 주입. 비어 있어도 앱은 기동되고 업로드 시점에만 실패한다(지연 실패).
supabase.url=${SUPABASE_URL:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:product-images}

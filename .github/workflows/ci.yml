name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # AuthFlowIntegrationTest가 실제 Redis를 사용 (localhost:6379)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 설정 (캐시 포함)
        uses: gradle/actions/setup-gradle@v4

      - name: 빌드 및 테스트 (ArchUnit 경계 검사 포함)
        run: ./gradlew build
        env:
          # CI 전용 임의 값 — 운영 시크릿과 무관, 테스트 컨텍스트 로딩용
          JWT_SECRET: ci-only-jwt-secret-0123456789abcdef0123456789abcdef0123456789abcdef

      - name: 실패 시 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/
          retention-days: 7
